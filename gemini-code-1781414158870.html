<section>
    <h3>📑 詞彙查詢結果</h3>
    <div v-if="currentWordData">
        <div class="status-success">✅ 詞彙中有該單字</div>
        <div v-for="(val, key) in currentWordData" :key="key" v-if="key !== 'id' && key !== 'createdAt'" style="margin-bottom: 10px;">
            <b style="color:var(--text-dim)">{{ key }}：</b> {{ val }}
        </div>
    </div>
    <div v-else style="color: #E2B714;">
        ⚠️ 字庫中查無此單字。
    </div>
</section>
